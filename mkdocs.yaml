site_name: Needle Documentation

nav:
  - Home: index.md
  - Installation & Setup: installation_and_setup.md
  - Configuration: configuration.md
  - Pipeline Reference: pipeline_reference.md
  - CLI Entrypoints: cli_entrypoints.md
  - Triggering Setup: triggering_setup.md
  - Needle Development:
      - Overview: needle_development/overview.md
      - Project Structure: needle_development/project_structure.md
      - Basic Design: needle_development/design.md
      - Architectural Decisions: needle_development/adr.md
      - Event Driven Architecture: needle_development/event_driven_architecture.md
  - API Reference: api_reference/

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_api_pages.py
        - docs/gen_entrypoints.py
  - literate-nav:
      nav_file: api_reference/SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: false
            show_root_toc_entry: false
            show_category_heading: false
            show_submodules: false
            heading_level: 2
            docstring_section_style: table

markdown_extensions:
  - pymdownx.snippets

theme:
  name: material
  palette:
    scheme: slate # dark mode, or remove for light
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    # - navigation.expand
    - toc.integrate # shows the table of contents in the sidebar
    - content.code.copy # adds copy button to code blocks

extra_css:
  - stylesheets/extra.css
