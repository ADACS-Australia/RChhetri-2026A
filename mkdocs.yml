site_name: Needle Documentation

nav:
  - Home: index.md
  - Installation: installation.md
  - Needle Development:
      - Overview: needle-dev/overview.md
      - Project Structure: needle-dev/project-structure.md
      - Basic Design: needle-dev/design.md
      - Decisions: needle-dev/decisions.md
  - API Reference: api/

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_api_pages.py
  - literate-nav:
      nav_file: api/SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: false
            show_root_toc_entry: false
            show_category_heading: false
            show_submodules: false
            heading_level: 2
            docstring_section_style: table

markdown_extensions:
  - pymdownx.snippets

theme:
  name: material
  palette:
    scheme: slate # dark mode, or remove for light
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    # - navigation.expand
    - toc.integrate # shows the table of contents in the sidebar
    - content.code.copy # adds copy button to code blocks
